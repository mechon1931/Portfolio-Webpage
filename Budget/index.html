<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget – Like EveryDollar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="./css/styles.css"/>

</head>
<body>

<header>
  <div class="header-content container">
    <div class="logo">Budget</div>
  </div>
</header>

<main class="container">

  <div class="summary-cards">
    <div class="card income">
      <div class="card-label">Income</div>
      <div class="card-amount" id="total-income">$0.00</div>
    </div>

    <div class="card expense">
      <div class="card-label">Expenses</div>
      <div class="card-amount" id="total-expenses">$0.00</div>
    </div>

    <div class="card remaining">
      <div class="card-label">Money Left</div>
      <div class="card-amount" id="remaining">$0.00</div>
    </div>
  </div>

  <div class="add-transaction">
    <h2 style="margin-bottom: 20px;">Add Transaction</h2>
    <div class="form-row">
      <input type="text" id="description" placeholder="What did you pay for / receive?" required>
      <input type="number" id="amount" placeholder="Amount" step="0.01" required>
      <select id="type">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>
      <button class="btn btn-primary" onclick="addTransaction()">Add</button>
    </div>
  </div>

  <div class="transactions-list" id="transactions">
    <!-- transactions inserted here -->
  </div>

</main>

<script type="module" src="./js/index.js"></script>

</body>
</html>
