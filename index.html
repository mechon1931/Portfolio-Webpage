<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Amazing Gym!</title>
    <link rel="stylesheet" href="./styles.css">
</head>
    <body>
        <!-- Header -->
        <header class="header">
            <div class="header-container">

                <!-- Logo -->
                <div class="logo">
                    <span class="logo-icon">💪</span>
                    <h1 class="logo-text">Be Amazing Gym!</h1>
                </div>

                <!-- Date + Greeting -->
                <div class="date-greeting">
                    <p id="current-date" class="date"></p>
                    <p id="greeting" class="greeting"></p>
                </div>

                <!-- Right Side -->
                <div class="header-right">
                    <button id="theme-toggle" class="icon-btn">🌙</button>
                    <button id="profile-btn" class="icon-btn">👤</button>
                </div>
            </div>
                
            
        </header>
        <script src="script.js"></script>
    </body>
</html>
