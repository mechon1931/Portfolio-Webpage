<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Amazing Gym!</title>
    <link rel="stylesheet" href="./styles.css">
</head>
    <body>
        <!-- Header -->
        <header class="header">
            <div class="header-container">

                <!-- Logo -->
                <div class="logo">
                    <span class="logo-icon">💪</span>
                    <h1 class="logo-text">Be Amazing Gym!</h1>
                </div>

                <!-- Date + Greeting -->
                <div class="date-greeting">
                    <p id="current-date" class="date"></p>
                    <p id="greeting" class="greeting"></p>
                </div>

                <!-- Right Side -->
                <div class="header-right">
                    <button id="theme-toggle" class="icon-btn">🌙</button>
                    <button id="profile-btn" class="icon-btn">👤</button>
                </div>
            </div>   
        </header>

        <!-- Stats Section -->
        <section class="stats">
            <div class="stats-container">   
                <!-- Stats Card 1-->
                 <div class="stat-card">
                    <p class="stat-label">This Month</p>
                    <p class="stat-value">12</p>
                    <p class="stat-sub">Workouts</p>
                 </div>
                 <!-- Stats Card 2-->
                 <div class="stat-card">
                    <p class="stat-label">Total Volume</p>
                    <p class="stat-value">48.2k</p>
                    <p class="stat-sub">kg * +18%</p>
                 </div>
                 <!-- Stats Card 3-->
                 <div class="stat-card">
                    <p class="stat-label">Current Streak</p>
                    <p class="stat-value">7 
                        <span class="fire">🔥</span>
                    </p>
                    <p class="stat-sub">Workouts</p>
                 </div>
            </div>
        </section>
        <script src="script.js"></script>
    </body>
</html>
